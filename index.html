<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1c1a17">
<title>World's 101 Best Steaks — Map</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1c1a17;          /* charcoal griddle */
    --panel:#26231f;
    --panel-2:#2f2b26;
    --cream:#f6efdf;        /* brioche */
    --gold:#f2b23e;         /* top-10 gold */
    --tomato:#d94f30;       /* 11–50 */
    --smoke:#8c8578;
    --line:#3a352e;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:'Inter',system-ui,sans-serif;background:var(--ink);color:var(--cream);overflow:hidden}

  /* ---------- Header ---------- */
  header{
    position:fixed;top:0;left:0;right:0;z-index:1200;
    display:flex;align-items:center;gap:10px;
    padding:10px 14px;
    background:linear-gradient(180deg,rgba(28,26,23,.97),rgba(28,26,23,.9));
    border-bottom:1px solid var(--line);
  }
  .logo{display:flex;flex-direction:column;line-height:1;min-width:max-content}
  .logo .t1{font-family:'Anton',Impact,sans-serif;font-size:19px;letter-spacing:.5px;color:var(--gold)}
  .logo .t2{font-size:9px;letter-spacing:2.5px;color:var(--smoke);text-transform:uppercase;margin-top:3px}
  .searchbox{flex:1;display:flex;align-items:center;background:var(--panel-2);border:1px solid var(--line);border-radius:999px;padding:0 12px;max-width:420px}
  .searchbox input{flex:1;background:none;border:none;outline:none;color:var(--cream);font:500 14px 'Inter',sans-serif;padding:9px 6px}
  .searchbox input::placeholder{color:var(--smoke)}
  .searchbox svg{flex:none;opacity:.6}

  /* ---------- Filter chips ---------- */
  .chips{
    position:fixed;top:58px;left:0;right:0;z-index:1150;
    display:flex;gap:8px;padding:8px 14px;overflow-x:auto;scrollbar-width:none;
    -webkit-overflow-scrolling:touch;
  }
  .chips::-webkit-scrollbar{display:none}
  .chip{
    flex:none;padding:7px 14px;border-radius:999px;font:600 12px 'Inter',sans-serif;
    background:var(--panel);border:1px solid var(--line);color:var(--cream);cursor:pointer;
    transition:background .15s,color .15s;
  }
  .chip.on{background:var(--gold);border-color:var(--gold);color:var(--ink)}

  /* ---------- Map ---------- */
  #map{position:fixed;inset:0;z-index:1;background:#d8e0e0}
  .leaflet-container{font-family:'Inter',sans-serif}
  .leaflet-control-zoom{border:none!important;margin-bottom:24px!important;margin-left:14px!important}
  .leaflet-control-zoom a{background:var(--panel)!important;color:var(--cream)!important;border:1px solid var(--line)!important}

  /* rank badge markers */
  .badge{
    display:flex;align-items:center;justify-content:center;
    width:34px;height:34px;border-radius:50% 50% 50% 4px;
    font:700 12px 'Inter',sans-serif;color:var(--ink);
    border:2px solid var(--ink);
    box-shadow:0 2px 6px rgba(0,0,0,.5);
    transform:rotate(-8deg);
  }
  .badge.gold{background:var(--gold)}
  .badge.tomato{background:var(--tomato);color:var(--cream)}
  .badge.char{background:var(--cream);color:var(--ink)}

  .cluster{
    display:flex;align-items:center;justify-content:center;
    width:40px;height:40px;border-radius:50%;
    background:var(--tomato);color:var(--cream);
    font:700 13px 'Inter',sans-serif;border:2px solid var(--ink);
    box-shadow:0 2px 8px rgba(0,0,0,.5);
  }

  /* popup */
  .leaflet-popup-content-wrapper{background:var(--panel);color:var(--cream);border-radius:12px;border:1px solid var(--line)}
  .leaflet-popup-tip{background:var(--panel)}
  .leaflet-popup-content{margin:14px 16px;min-width:190px}
  .pp-rank{font-family:'Anton',Impact,sans-serif;font-size:13px;color:var(--gold);letter-spacing:1px}
  .pp-name{font-family:'Anton',Impact,sans-serif;font-size:19px;letter-spacing:.5px;margin:2px 0 1px}
  .pp-city{font-size:12px;color:var(--smoke);margin-bottom:10px}
  .pp-actions{display:flex;gap:8px}
  .pp-actions a{
    flex:1;text-align:center;text-decoration:none;padding:8px 6px;border-radius:8px;
    font:600 12px 'Inter',sans-serif;
  }
  .pp-dir{background:var(--gold);color:var(--ink)}
  .pp-ig{background:var(--panel-2);color:var(--cream);border:1px solid var(--line)}
  .pp-note{font-size:10px;color:var(--smoke);margin-top:8px}

  /* ---------- Floating buttons ---------- */
  .fab{
    position:fixed;z-index:1100;display:flex;align-items:center;gap:8px;
    background:var(--gold);color:var(--ink);border:none;border-radius:999px;
    font:700 13px 'Inter',sans-serif;padding:12px 18px;cursor:pointer;
    box-shadow:0 4px 14px rgba(0,0,0,.5);
  }
  #listBtn{bottom:22px;left:50%;transform:translateX(-50%)}
  #locBtn{bottom:22px;right:16px;width:46px;height:46px;padding:0;justify-content:center;background:var(--panel);color:var(--cream);border:1px solid var(--line)}

  /* ---------- List panel ---------- */
  #panel{
    position:fixed;z-index:1300;left:0;right:0;bottom:0;top:auto;height:72%;
    background:var(--panel);border-top-left-radius:18px;border-top-right-radius:18px;
    border:1px solid var(--line);display:flex;flex-direction:column;
    transform:translateY(105%);transition:transform .28s ease;
  }
  #panel.open{transform:translateY(0)}
  .panel-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 8px}
  .panel-head h2{font-family:'Anton',Impact,sans-serif;font-size:16px;letter-spacing:1px}
  .panel-head .cnt{font-size:12px;color:var(--smoke)}
  .closex{background:none;border:none;color:var(--smoke);font-size:22px;cursor:pointer;line-height:1}
  #list{flex:1;overflow-y:auto;padding:0 10px 20px}
  .row{
    display:flex;align-items:center;gap:12px;padding:11px 8px;
    border-bottom:1px solid var(--line);cursor:pointer;border-radius:8px;
  }
  .row:hover{background:var(--panel-2)}
  .row .rk{
    flex:none;width:38px;height:38px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font:700 13px 'Inter',sans-serif;color:var(--ink);
  }
  .rk.gold{background:var(--gold)} .rk.tomato{background:var(--tomato);color:var(--cream)} .rk.char{background:var(--cream)}
  .row .nm{font:600 14px 'Inter',sans-serif}
  .row .ct{font-size:12px;color:var(--smoke);margin-top:2px}
  .empty{padding:30px;text-align:center;color:var(--smoke);font-size:13px}

  /* ---------- Desktop layout ---------- */
  @media(min-width:900px){
    #panel{
      top:0;bottom:0;left:0;right:auto;width:360px;height:100%;
      border-radius:0;border-right:1px solid var(--line);
      transform:none;padding-top:74px;z-index:1100;
    }
    #panel .closex{display:none}
    #listBtn{display:none}
    #map{left:360px}
    .chips{left:360px;right:0;top:66px}
    header{padding-left:20px}
  }
</style>
</head>

const data=R.map(r=>({rank:r[0],name:r[1],city:r[2],region:r[3],lat:r[4],lng:r[5],slug:r[6]}));

// ---------- Map ----------
const map=L.map('map',{zoomControl:false,worldCopyJump:true}).setView([25,10],2);
L.control.zoom({position:'bottomleft'}).addTo(map);
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{
  attribution:'&copy; OpenStreetMap &copy; CARTO · Ranking © worldbeststeaks.com',
  maxZoom:19
}).addTo(map);

const tier=r=>r<=10?'gold':r<=50?'tomato':'char';

const cluster=L.markerClusterGroup({
  showCoverageOnHover:false,
  maxClusterRadius:44,
  iconCreateFunction:c=>L.divIcon({html:`<div class="cluster">${c.getChildCount()}</div>`,className:'',iconSize:[40,40]})
});

function popupHtml(d){
  const gm=`https://www.google.com/maps/search/${encodeURIComponent(d.name+' '+d.city)}`;
  return `<div>
    <div class="pp-rank">NO. ${d.rank}</div>
    <div class="pp-name">${d.name.toUpperCase()}</div>
    <div class="pp-city">${d.city}</div>
    <div class="pp-actions">
      <a class="pp-dir" href="${gm}" target="_blank" rel="noopener">Directions</a>
      <a class="pp-ig" href="https://www.worldbeststeaks.com/2026-list-1-101/${d.slug}" target="_blank" rel="noopener">Full profile</a>
    </div>
    <div class="pp-note">Pin shows the neighbourhood — tap Directions for the exact address.</div>
  </div>`;
}

data.forEach(d=>{
  d.marker=L.marker([d.lat,d.lng],{
    icon:L.divIcon({html:`<div class="badge ${tier(d.rank)}">${d.rank}</div>`,className:'',iconSize:[34,34],iconAnchor:[17,30]})
  }).bindPopup(popupHtml(d));
});

// ---------- Filtering / list ----------
const listEl=document.getElementById('list'),cntEl=document.getElementById('cnt'),qEl=document.getElementById('q');
let activeFilter='all';

function visible(){
  const q=qEl.value.trim().toLowerCase();
  return data.filter(d=>{
    if(activeFilter==='top10'&&d.rank>10)return false;
    if(activeFilter==='top25'&&d.rank>25)return false;
    if(['Europe','Americas','Asia','Oceania','Africa'].includes(activeFilter)&&d.region!==activeFilter)return false;
    if(q&&!(d.name.toLowerCase().includes(q)||d.city.toLowerCase().includes(q)))return false;
    return true;
  });
}

function render(){
  const v=visible();
  cluster.clearLayers();
  v.forEach(d=>cluster.addLayer(d.marker));
  if(!map.hasLayer(cluster))map.addLayer(cluster);

  cntEl.textContent=`${v.length} place${v.length===1?'':'s'}`;
  listEl.innerHTML=v.length?'':'<div class="empty">No steaks match that search. Try another name or city.</div>';
  v.forEach(d=>{
    const row=document.createElement('div');
    row.className='row';
    row.innerHTML=`<div class="rk ${tier(d.rank)}">${d.rank}</div>
      <div><div class="nm">${d.name}</div><div class="ct">${d.city}</div></div>`;
    row.onclick=()=>{
      closePanelOnMobile();
      map.setView([d.lat,d.lng],14,{animate:true});
      setTimeout(()=>d.marker.openPopup(),350);
    };
    listEl.appendChild(row);
  });
}

qEl.addEventListener('input',render);
document.getElementById('chips').addEventListener('click',e=>{
  const b=e.target.closest('.chip');if(!b)return;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
  b.classList.add('on');activeFilter=b.dataset.f;render();
  const v=visible();
  if(v.length&&activeFilter!=='all'){
    map.fitBounds(L.latLngBounds(v.map(d=>[d.lat,d.lng])),{padding:[50,50]});
  }
});

// ---------- Panel (mobile bottom sheet / desktop sidebar) ----------
const panel=document.getElementById('panel');
const isDesktop=()=>window.matchMedia('(min-width:900px)').matches;
function closePanelOnMobile(){if(!isDesktop())panel.classList.remove('open')}
document.getElementById('listBtn').onclick=()=>panel.classList.toggle('open');
document.getElementById('closePanel').onclick=()=>panel.classList.remove('open');
function syncPanel(){if(isDesktop())panel.classList.add('open')}
window.addEventListener('resize',syncPanel);

// ---------- Locate me ----------
let meMarker=null;
document.getElementById('locBtn').onclick=()=>{
  if(!navigator.geolocation){alert('Location is not available in this browser.');return}
  navigator.geolocation.getCurrentPosition(p=>{
    const ll=[p.coords.latitude,p.coords.longitude];
    if(meMarker)meMarker.remove();
    meMarker=L.circleMarker(ll,{radius:8,color:'#f2b23e',weight:3,fillColor:'#f2b23e',fillOpacity:.4}).addTo(map).bindPopup('You are here');
    map.setView(ll,11,{animate:true});
  },()=>alert('Could not get your location. Check that location access is allowed.'));
};

syncPanel();
render();
</script>
</body>
</html>
